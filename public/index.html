<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velocity Pro Sims — Standard Operating Procedures</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #5CBF2A;
      --green-light: #7DD94D;
      --green-dim: rgba(92,191,42,0.12);
      --green-glow: rgba(92,191,42,0.25);
      --bg-primary: #0A0A0C;
      --bg-secondary: #111114;
      --bg-card: #16161A;
      --bg-card-hover: #1C1C22;
      --bg-input: #1A1A20;
      --border: #2A2A32;
      --border-light: #3A3A44;
      --text-primary: #F0F0F2;
      --text-secondary: #9A9AA8;
      --text-muted: #6A6A78;
      --danger: #EF4444;
      --warning: #F59E0B;
      --info: #3B82F6;
      --radius: 12px;
      --radius-sm: 8px;
      --radius-lg: 16px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
      --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

    /* ── Login Screen ── */
    .login-screen {
      position: fixed; inset: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg-primary);
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    .login-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .login-bg {
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(92,191,42,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 50%, rgba(92,191,42,0.04) 0%, transparent 60%);
    }

    .login-card {
      position: relative; z-index: 1;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 48px 40px;
      width: 100%; max-width: 420px;
      text-align: center;
      box-shadow: var(--shadow-lg);
    }

    .login-logo { height: 60px; margin-bottom: 24px; filter: drop-shadow(0 2px 8px rgba(92,191,42,0.3)); }
    .login-title { font-family: 'Rajdhani', sans-serif; font-size: 1.1rem; font-weight: 600; color: var(--text-secondary); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 32px; }

    .password-field {
      position: relative; margin-bottom: 16px;
    }
    .password-field input {
      width: 100%; padding: 14px 48px 14px 16px;
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text-primary);
      font-size: 0.95rem; font-family: 'Inter', sans-serif;
      transition: border-color var(--transition);
      outline: none;
    }
    .password-field input:focus { border-color: var(--green); }
    .password-field input::placeholder { color: var(--text-muted); }
    .password-field .toggle-pw {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: var(--text-muted); cursor: pointer;
      font-size: 1rem; transition: color var(--transition);
    }
    .password-field .toggle-pw:hover { color: var(--text-secondary); }

    .login-btn {
      width: 100%; padding: 14px; border: none; border-radius: var(--radius-sm);
      background: var(--green); color: #000; font-weight: 700;
      font-size: 0.95rem; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: all var(--transition);
      letter-spacing: 0.5px;
    }
    .login-btn:hover { background: var(--green-light); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(92,191,42,0.3); }
    .login-btn:active { transform: translateY(0); }

    .login-error {
      color: var(--danger); font-size: 0.85rem; margin-top: 12px;
      opacity: 0; transition: opacity var(--transition);
    }
    .login-error.show { opacity: 1; }

    /* ── App Shell ── */
    .app { display: none; min-height: 100vh; }
    .app.visible { display: flex; flex-direction: column; }

    /* ── Header ── */
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,12,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
    }
    .header-inner {
      display: flex; align-items: center; justify-content: space-between;
      max-width: 1400px; margin: 0 auto;
      height: 64px;
    }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .header-logo { height: 36px; cursor: pointer; transition: transform var(--transition); }
    .header-logo:hover { transform: scale(1.05); }
    .header-divider { width: 1px; height: 24px; background: var(--border); }
    .header-title { font-family: 'Rajdhani', sans-serif; font-size: 0.85rem; font-weight: 600; color: var(--text-secondary); letter-spacing: 2px; text-transform: uppercase; }

    .header-right { display: flex; align-items: center; gap: 16px; }

    .search-bar {
      position: relative; width: 280px;
    }
    .search-bar input {
      width: 100%; padding: 9px 14px 9px 36px;
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text-primary);
      font-size: 0.85rem; font-family: 'Inter', sans-serif;
      outline: none; transition: all var(--transition);
    }
    .search-bar input:focus { border-color: var(--green); background: var(--bg-card); }
    .search-bar input::placeholder { color: var(--text-muted); }
    .search-bar i {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: 0.85rem;
    }
    .search-results-dropdown {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0;
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-sm); max-height: 320px; overflow-y: auto;
      box-shadow: var(--shadow-lg); display: none; z-index: 200;
    }
    .search-results-dropdown.open { display: block; }
    .search-result-item {
      padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--border);
      transition: background var(--transition);
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: var(--bg-card-hover); }
    .search-result-item .sr-cat { font-size: 0.7rem; color: var(--green); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    .search-result-item .sr-title { font-size: 0.85rem; color: var(--text-primary); margin-top: 2px; }

    .btn-icon {
      width: 36px; height: 36px; border: 1px solid var(--border);
      border-radius: var(--radius-sm); background: var(--bg-input);
      color: var(--text-secondary); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; transition: all var(--transition);
    }
    .btn-icon:hover { border-color: var(--green); color: var(--green); }

    /* ── Layout ── */
    .layout {
      display: flex; flex: 1; max-width: 1400px;
      margin: 0 auto; width: 100%; padding: 0 32px;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px; flex-shrink: 0;
      padding: 24px 0; position: sticky;
      top: 64px; height: calc(100vh - 64px);
      overflow-y: auto;
      border-right: 1px solid var(--border);
      padding-right: 24px;
    }

    .sidebar-label {
      font-size: 0.7rem; font-weight: 600; color: var(--text-muted);
      letter-spacing: 2px; text-transform: uppercase;
      padding: 0 12px; margin-bottom: 8px;
    }

    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; border-radius: var(--radius-sm);
      cursor: pointer; transition: all var(--transition);
      color: var(--text-secondary); font-size: 0.9rem; font-weight: 450;
      margin-bottom: 2px;
    }
    .nav-item:hover { background: var(--green-dim); color: var(--text-primary); }
    .nav-item.active { background: var(--green-dim); color: var(--green); }
    .nav-item i { width: 20px; text-align: center; font-size: 0.85rem; }
    .nav-item .badge {
      margin-left: auto; background: var(--bg-input); color: var(--text-muted);
      font-size: 0.7rem; padding: 2px 7px; border-radius: 10px; font-weight: 600;
    }
    .nav-item.active .badge { background: rgba(92,191,42,0.2); color: var(--green); }

    .sidebar-spacer { height: 24px; }

    /* ── Main Content ── */
    .main { flex: 1; padding: 32px 0 64px 32px; min-width: 0; }

    /* ── Dashboard View ── */
    .dashboard-header { margin-bottom: 32px; }
    .dashboard-header h1 {
      font-family: 'Rajdhani', sans-serif; font-size: 2rem;
      font-weight: 700; margin-bottom: 4px;
    }
    .dashboard-header p { color: var(--text-secondary); font-size: 0.95rem; }

    .stats-row {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;
      margin-bottom: 32px;
    }
    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px;
      transition: all var(--transition);
    }
    .stat-card:hover { border-color: var(--border-light); transform: translateY(-2px); box-shadow: var(--shadow); }
    .stat-label { font-size: 0.8rem; color: var(--text-muted); font-weight: 500; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
    .stat-value { font-family: 'Rajdhani', sans-serif; font-size: 2rem; font-weight: 700; color: var(--text-primary); }
    .stat-value .accent { color: var(--green); }

    /* ── Category View ── */
    .category-view { display: none; }
    .category-view.active { display: block; }

    .category-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 28px; padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }
    .category-header-left { display: flex; align-items: center; gap: 14px; }
    .category-icon-lg {
      width: 48px; height: 48px; border-radius: var(--radius);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }
    .category-header h2 { font-family: 'Rajdhani', sans-serif; font-size: 1.6rem; font-weight: 700; }
    .category-header .subtitle { font-size: 0.85rem; color: var(--text-secondary); }

    .btn-add-sop {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 18px; border: 1px solid var(--green);
      border-radius: var(--radius-sm); background: transparent;
      color: var(--green); font-size: 0.85rem; font-weight: 600;
      font-family: 'Inter', sans-serif; cursor: pointer;
      transition: all var(--transition);
    }
    .btn-add-sop:hover { background: var(--green); color: #000; }

    /* ── SOP Cards ── */
    .sop-list { display: flex; flex-direction: column; gap: 8px; }

    .sop-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px;
      cursor: pointer; transition: all var(--transition);
      display: flex; align-items: center; gap: 16px;
    }
    .sop-card:hover { border-color: var(--border-light); background: var(--bg-card-hover); transform: translateX(4px); }

    .sop-card-icon {
      width: 40px; height: 40px; border-radius: var(--radius-sm);
      background: var(--green-dim); color: var(--green);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.95rem; flex-shrink: 0;
    }
    .sop-card-body { flex: 1; min-width: 0; }
    .sop-card-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 2px; }
    .sop-card-desc { font-size: 0.82rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .sop-card-meta {
      display: flex; align-items: center; gap: 14px; flex-shrink: 0;
    }
    .sop-tag {
      font-size: 0.7rem; font-weight: 600; padding: 4px 10px;
      border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .sop-tag.critical { background: rgba(239,68,68,0.12); color: #EF4444; }
    .sop-tag.important { background: rgba(245,158,11,0.12); color: #F59E0B; }
    .sop-tag.standard { background: rgba(92,191,42,0.12); color: var(--green); }
    .sop-tag.info { background: rgba(59,130,246,0.12); color: #3B82F6; }
    .sop-card-date { font-size: 0.78rem; color: var(--text-muted); white-space: nowrap; }

    /* ── SOP Detail Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden; transition: all 0.3s ease;
      padding: 24px;
    }
    .modal-overlay.open { opacity: 1; visibility: visible; }

    .modal {
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: var(--radius-lg); width: 100%; max-width: 780px;
      max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow-lg);
      transform: translateY(20px); transition: transform 0.3s ease;
    }
    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 24px 28px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg-secondary); z-index: 1;
    }
    .modal-header h3 { font-family: 'Rajdhani', sans-serif; font-size: 1.3rem; font-weight: 700; }
    .modal-close {
      width: 32px; height: 32px; border: 1px solid var(--border);
      border-radius: var(--radius-sm); background: none; color: var(--text-secondary);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
    }
    .modal-close:hover { border-color: var(--danger); color: var(--danger); }

    .modal-body { padding: 28px; }
    .modal-body .meta-row {
      display: flex; gap: 24px; margin-bottom: 24px; padding-bottom: 20px;
      border-bottom: 1px solid var(--border); flex-wrap: wrap;
    }
    .meta-item { display: flex; flex-direction: column; gap: 4px; }
    .meta-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
    .meta-value { font-size: 0.85rem; color: var(--text-primary); font-weight: 500; }

    .modal-body h4 { font-family: 'Rajdhani', sans-serif; font-size: 1.05rem; font-weight: 700; color: var(--green); margin: 24px 0 12px; }
    .modal-body h4:first-of-type { margin-top: 0; }
    .modal-body p, .modal-body li { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.7; }
    .modal-body ul, .modal-body ol { padding-left: 20px; margin-bottom: 12px; }
    .modal-body li { margin-bottom: 6px; }

    /* ── Add/Edit SOP Modal ── */
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 10px 14px;
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text-primary);
      font-size: 0.9rem; font-family: 'Inter', sans-serif;
      outline: none; transition: border-color var(--transition);
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--green); }
    .form-group textarea { min-height: 200px; resize: vertical; line-height: 1.7; }
    .form-group select { cursor: pointer; }
    .form-group select option { background: var(--bg-card); }

    .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }
    .btn-cancel {
      padding: 10px 20px; border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: none; color: var(--text-secondary); font-size: 0.85rem;
      font-family: 'Inter', sans-serif; cursor: pointer; transition: all var(--transition);
    }
    .btn-cancel:hover { border-color: var(--text-secondary); color: var(--text-primary); }
    .btn-save {
      padding: 10px 24px; border: none; border-radius: var(--radius-sm);
      background: var(--green); color: #000; font-weight: 700;
      font-size: 0.85rem; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: all var(--transition);
    }
    .btn-save:hover { background: var(--green-light); }

    /* ── Marketing Assets ── */
    .assets-filter-row {
      display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .assets-filter-btn {
      padding: 6px 14px; border: 1px solid var(--border); border-radius: 20px;
      background: none; color: var(--text-secondary); font-size: 0.8rem;
      font-family: 'Inter', sans-serif; cursor: pointer; font-weight: 500;
      transition: all var(--transition);
    }
    .assets-filter-btn:hover { border-color: var(--border-light); color: var(--text-primary); }
    .assets-filter-btn.active { border-color: #E879F9; color: #E879F9; background: rgba(232,121,249,0.1); }

    .assets-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
    }
    .asset-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      cursor: pointer; transition: all var(--transition);
    }
    .asset-card:hover { border-color: var(--border-light); transform: translateY(-3px); box-shadow: var(--shadow); }
    .asset-card-img {
      width: 100%; height: 140px; object-fit: contain;
      background: repeating-conic-gradient(#1a1a20 0% 25%, #222230 0% 50%) 50% / 16px 16px;
      padding: 16px;
    }
    .asset-card-body { padding: 12px 14px; }
    .asset-card-name { font-weight: 600; font-size: 0.85rem; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .asset-card-meta { display: flex; align-items: center; justify-content: space-between; }
    .asset-card-tag {
      font-size: 0.68rem; font-weight: 600; padding: 2px 8px;
      border-radius: 10px; text-transform: uppercase; letter-spacing: 0.5px;
      background: rgba(232,121,249,0.12); color: #E879F9;
    }
    .asset-card-size { font-size: 0.72rem; color: var(--text-muted); }

    .asset-dropzone {
      border: 2px dashed var(--border); border-radius: var(--radius);
      padding: 32px; text-align: center; cursor: pointer;
      transition: all var(--transition); display: flex;
      flex-direction: column; align-items: center; gap: 8px;
      color: var(--text-muted);
    }
    .asset-dropzone:hover { border-color: #E879F9; color: #E879F9; }
    .asset-dropzone i { font-size: 2rem; }
    .asset-dropzone span { font-size: 0.9rem; }
    .dropzone-sub { font-size: 0.75rem !important; color: var(--text-muted) !important; }
    .asset-dropzone.drag-over { border-color: #E879F9; background: rgba(232,121,249,0.05); }

    .asset-preview-wrap {
      position: relative; margin-top: 12px; display: inline-block;
      border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden;
    }
    .asset-preview-img { max-width: 100%; max-height: 180px; display: block; }
    .asset-preview-remove {
      position: absolute; top: 6px; right: 6px;
      width: 24px; height: 24px; border-radius: 50%;
      background: rgba(0,0,0,0.7); border: none; color: #fff;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-size: 0.7rem;
    }

    .assets-empty {
      text-align: center; padding: 60px 20px;
      color: var(--text-muted);
    }
    .assets-empty i { font-size: 3rem; margin-bottom: 16px; display: block; color: var(--border-light); }
    .assets-empty p { font-size: 0.95rem; margin-bottom: 8px; }
    .assets-empty span { font-size: 0.82rem; }

    /* ── Website Hub ── */
    .web-group { margin-bottom: 28px; }
    .web-group-header {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px; padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .web-group-icon {
      width: 28px; height: 28px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem;
    }
    .web-group-title {
      font-family: 'Rajdhani', sans-serif; font-size: 1rem;
      font-weight: 700; color: var(--text-primary);
    }
    .web-group-count {
      font-size: 0.7rem; color: var(--text-muted); font-weight: 500;
      margin-left: auto;
    }
    .web-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
    }
    .web-tile {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 16px; background: var(--bg-card);
      border: 1px solid var(--border); border-radius: var(--radius);
      text-decoration: none; color: inherit;
      transition: all var(--transition); cursor: pointer;
    }
    .web-tile:hover {
      border-color: var(--border-light); background: var(--bg-card-hover);
      transform: translateY(-2px); box-shadow: var(--shadow);
    }
    .web-tile-icon {
      width: 40px; height: 40px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
    }
    .web-tile-body { flex: 1; min-width: 0; }

    description: 'Maintaining comfortable temperatures for extended sim sessions and protecting equipment.',
    priority: 'standard', updatedBy: 'Jose', updatedAt: '2026-03-10',
    content: `<h4>Purpose</h4><p>Sim rigs generate significant heat. Proper climate control ensures customer comfort and prevents hardware overheating.</p>

<li>Target ambient temp: 68–72°F (20–22°C)</li>
<li>If rig area exceeds 76°F (24°C), increase AC output or open additional ventilation</li>
<li>Monitor PC intake temps — flag any system running above 85°C under load</li>

<li><strong>Summer</strong>: Pre-cool the facility 1 hour before opening. Consider portable fans near rig clusters.</li>
<li><strong>Winter</strong>: Don't over-heat — the rigs add warmth. Keep humidity above 30% to prevent static.</li>
</ul>
<h4>Maintenance</h4><p>Replace HVAC filters monthly. Schedule professional HVAC servicing quarterly. Log all filter changes in the Facility Maintenance sheet.</p>`

    id: 14, category: 'tech', title: 'Network & Connectivity Troubleshooting',
    description: 'Resolving common network issues affecting multiplayer, online sim titles, and booking systems.',
    priority: 'important', updatedBy: 'Jose', updatedAt: '2026-03-13',
    content: `<h4>Purpose</h4><p>Reliable network connectivity is critical for online racing, league servers, and the booking/POS system.</p>
<h4>Common Issues & Solutions</h4><ol>
<li><strong>Single PC can't connect</strong>: Check Ethernet cable, restart network adapter, verify IP assignment via DHCP</li>
<li><strong>All PCs losing connection</strong>: Restart the main router/switch. Check if the ISP is experiencing an outage.</li>
<li><strong>High latency / lag</strong>: Run a speed test. Check for bandwidth-hogging processes (e.g., Windows updates). Prioritize sim traffic on the router QoS settings.</li>
<li><strong>Server browser not loading</strong>: Verify DNS settings, try switching to 8.8.8.8 / 1.1.1.1</li>
<li><strong>Booking system offline</strong>: Check if the cloud service is up (visit the provider status page). Contact support if the issue persists beyond 15 minutes.</li>
</ol>
<h4>Escalation</h4><p>If a network issue cannot be resolved within 15 minutes, contact the IT provider. Keep a printed copy of their contact info at the front desk.</p>`
  },

    description: 'Setting up, maintaining, and troubleshooting VR headsets for sim racing use.',
    priority: 'standard', updatedBy: 'Jose', updatedAt: '2026-03-09',
    content: `<h4>Purpose</h4><p>VR provides an immersive experience but requires careful setup and maintenance to avoid issues during customer sessions.</p>
<h4>Setup for Each Session</h4><ol>
<li>Check the headset lenses for smudges — clean with a microfiber cloth only</li>
<li>Verify the cable is securely connected (USB and DisplayPort/USB-C)</li>
<li>Launch SteamVR (or Oculus software) and confirm tracking is active</li>
<li>Adjust the IPD (interpupillary distance) based on the customer's preference</li>
<li>Help the customer put on the headset and adjust the head strap for comfort</li>
</ol>
<h4>Troubleshooting</h4><ul>
<li><strong>Black screen</strong>: Reseat the cable, restart SteamVR, check GPU output</li>
<li><strong>Tracking lost</strong>: Check base station visibility (if applicable), restart tracking</li>
<li><strong>Blurry image</strong>: Adjust IPD, clean lenses, check per-app supersampling settings</li>
<li><strong>Motion sickness reported</strong>: Reduce FOV vignette, ensure framerate is locked at 90 Hz+, suggest a short break</li>
</ul>`

    id: 24, category: 'accounting', title: 'Fanatec Purchase Order Processing',
    description: 'Step-by-step procedure for placing purchase orders through Shopify to fulfill Fanatec/Corsair customer orders.',
    priority: 'critical', updatedBy: 'Jose', updatedAt: '2026-03-22',
    content: `<h4>Order Processing</h4><p>Follow these steps precisely to place a Purchase Order (PO) for Fanatec products to fulfill customer orders.</p>
<h4>Steps to Place PO for Fanatec to Fulfill Orders</h4><ol>
<li>Wait for email from Shopify with order details</li>
<li>Go to Shopify and click <strong>Apps</strong> (left bottom corner)</li>
<li>Click <strong>Ultimate Purchase Order</strong></li>
<li>Click <strong>Orders</strong></li>
<li>Look for the order (check shipping address) and click <strong>Create PO</strong></li>
<li>Ignore the message to resolve conflict</li>
<li>Click on <strong>Supplier</strong> (bottom right corner) — for Fanatec orders it will be <strong>Corsair</strong></li>
<li>Click <strong>Proceed</strong></li>
<li>Go to the Velocity Pro Sims website to make sure we are getting the discount from the vendor — copy the SKU from the email and paste it into the search bar. The purchase price must be higher than the price in the PO.</li>
<li>Go back to the PO and in the <strong>Custom Purchase PO Number</strong> field, write in the order number from the customer (VPS....)</li>
<li>Click <strong>Create and Send</strong> (top right corner) — the PO will be sent to the vendor</li>
<li>Once the vendor sends the invoice and it is paid, go back to <strong>Apps → Purchase Orders</strong> and mark the PO as paid. To mark as paid: select the PO, click <strong>Bulk Actions → Mark as Paid</strong>. In the window that opens, enter the vendor invoice number, change the payment type to <strong>PayPal</strong>, and click <strong>Create</strong>.</li>
</ol>
<h4>Important Notes</h4><ul>
<li>Always verify the discount pricing before submitting the PO</li>
<li>Double-check the shipping address matches the customer's order</li>
<li>Keep the customer order number (VPS...) consistent between Shopify and the PO</li>
<li>Do not submit the PO until all details have been verified</li>
</ul>`
  },

// ── State ──
let sopData = [];
let currentCategory = 'dashboard';

// ── Init ──
function init() {
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored) {
    sopData = JSON.parse(stored);
    // Merge in any new default SOPs that don't exist yet
    const existingIds = new Set(sopData.map(s => s.id));
    defaultSOPs.forEach(def => {
      if (!existingIds.has(def.id)) sopData.push(def);
    });
    saveData();
  } else {
    sopData = [...defaultSOPs];
    saveData();
  }

  if (sessionStorage.getItem(AUTH_KEY) === 'true') {
    showApp();
  }

  document.getElementById('passwordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') attemptLogin();
  });
  document.getElementById('searchInput').addEventListener('blur', () => {
    setTimeout(() => { document.getElementById('searchDropdown').classList.remove('open'); }, 200);
  });

  buildSidebar();
  buildCategorySelect();
  renderDashboard();
}

function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(sopData)); }

// ── Auth ──
function attemptLogin() {
  const pw = document.getElementById('passwordInput').value;
  if (pw === TEAM_PASSWORD) {
    sessionStorage.setItem(AUTH_KEY, 'true');
    showApp();
  } else {
    document.getElementById('loginError').classList.add('show');
    document.getElementById('passwordInput').value = '';
    document.getElementById('passwordInput').focus();
    setTimeout(() => document.getElementById('loginError').classList.remove('show'), 3000);
  }
}

function showApp() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
}

function logout() {
  sessionStorage.removeItem(AUTH_KEY);
  location.reload();
}

function togglePassword() {
  const inp = document.getElementById('passwordInput');
  const icon = document.getElementById('eyeIcon');
  if (inp.type === 'password') { inp.type = 'text'; icon.className = 'fas fa-eye-slash'; }
  else { inp.type = 'password'; icon.className = 'fas fa-eye'; }
}

// ── Sidebar ──
function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  const catLabel = sidebar.querySelectorAll('.sidebar-label')[1];
  // Remove old nav items after the category label
  const existingItems = sidebar.querySelectorAll('.nav-item:not([data-cat="dashboard"])');
  existingItems.forEach(el => el.remove());

  categories.forEach(cat => {
    const count = sopData.filter(s => s.category === cat.id).length;
    const div = document.createElement('div');
    div.className = 'nav-item' + (currentCategory === cat.id ? ' active' : '');
    div.dataset.cat = cat.id;
    div.onclick = () => showCategory(cat.id);
    div.innerHTML = `<i class="fas ${cat.icon}" style="color:${currentCategory === cat.id ? cat.color : ''}"></i> ${cat.name} <span class="badge">${count}</span>`;
    sidebar.appendChild(div);
  });
}

function setActiveNav(catId) {
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.cat === catId);
    const icon = el.querySelector('i');
    if (icon && el.dataset.cat !== 'dashboard') {
      const cat = categories.find(c => c.id === el.dataset.cat);
      if (cat) icon.style.color = el.dataset.cat === catId ? cat.color : '';
    }
  });
}

// ── Checklist Functions ──
function toggleChecklistItem(sopId, index, checked) {
  const sop = sopData.find(s => s.id === sopId);
  if (!sop || !sop.checklistItems) return;
  sop.checklistItems[index].checked = checked;
  saveData();
  openSOPModal(sopId);
}

function addChecklistItem(sopId) {
  const input = document.getElementById('newChecklistItem');
  const text = input.value.trim();
  if (!text) return;
  const sop = sopData.find(s => s.id === sopId);
  if (!sop) return;
  if (!sop.checklistItems) sop.checklistItems = [];
  sop.checklistItems.push({ text, checked: false });
  sop.isChecklist = true;
  saveData();
  openSOPModal(sopId);
}

function deleteChecklistItem(sopId, index) {
  const sop = sopData.find(s => s.id === sopId);
  if (!sop || !sop.checklistItems) return;
  sop.checklistItems.splice(index, 1);
  saveData();
  openSOPModal(sopId);
}

function resetChecklist(sopId) {
  const sop = sopData.find(s => s.id === sopId);
  if (!sop || !sop.checklistItems) return;
  sop.checklistItems.forEach(item => item.checked = false);
  saveData();
  openSOPModal(sopId);
}

function saveSOP() {
  const title = document.getElementById('sopFormTitle').value.trim();
  const category = document.getElementById('sopFormCategory').value;
  const priority = document.getElementById('sopFormPriority').value;
  const desc = document.getElementById('sopFormDesc').value.trim();
  const rawContent = document.getElementById('sopFormContent').value.trim();

  if (!title || !desc || !rawContent) {
    alert('Please fill in all fields.');
    return;
  }

  // Simple markdown-ish parsing
  let content = rawContent
    .replace(/^## (.+)$/gm, '<h4>$1</h4>')
    .replace(/^### (.+)$/gm, '<h4>$1</h4>')
    .replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>')
    .replace(/^[-*]\s+(.+)$/gm, '<li>$1</li>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Wrap consecutive <li> in <ol> or <ul>
  content = content.replace(/((<li>.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  // Wrap non-tag lines in <p>
  content = content.split('\n').map(line => {
    line = line.trim();
    if (!line || line.startsWith('<')) return line;
    return `<p>${line}</p>`;
  }).join('\n');

  const newSOP = {
    id: Date.now(),
    category, title, description: desc, priority,
    updatedBy: 'Jose',
    updatedAt: new Date().toISOString().split('T')[0],
    content
  };

  sopData.push(newSOP);
  saveData();
  closeAddModal();
  buildSidebar();

  if (currentCategory === 'dashboard') renderDashboard();
  else if (currentCategory === category) renderCategory(category);
  else showCategory(category);
}

// ── Search ──
function handleSearch(query) {
  const dropdown = document.getElementById('searchDropdown');
  if (!query.trim()) { dropdown.classList.remove('open'); return; }

  const q = query.toLowerCase();
  const results = sopData.filter(s =>
    s.title.toLowerCase().includes(q) ||
    s.description.toLowerCase().includes(q) ||
    s.content.toLowerCase().includes(q)
  ).slice(0, 8);

  if (!results.length) {
    dropdown.innerHTML = '<div style="padding:14px;color:var(--text-muted);font-size:0.85rem;">No results found</div>';
  } else {
    dropdown.innerHTML = results.map(sop => {
      const cat = categories.find(c => c.id === sop.category);
      return `<div class="search-result-item" onclick="openSOPModal(${sop.id})">
        <div class="sr-cat"><i class="fas ${cat.icon}"></i> ${cat.name}</div>
        <div class="sr-title">${sop.title}</div>
      </div>`;
    }).join('');
  }
  dropdown.classList.add('open');
}

  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// ── Marketing Assets ──
const ASSETS_KEY = 'vps_assets';
let assetsData = [];
let assetFilter = 'all';
let pendingAssetData = null;
let viewingAssetId = null;

function loadAssets() {
  const stored = localStorage.getItem(ASSETS_KEY);
  assetsData = stored ? JSON.parse(stored) : [];
}
function saveAssets() { localStorage.setItem(ASSETS_KEY, JSON.stringify(assetsData)); }

function renderAssetsCategory() {
  loadAssets();
  const cat = categories.find(c => c.id === 'assets');
  const main = document.getElementById('mainContent');
  const tags = ['all', 'logo', 'icon', 'banner', 'social', 'print', 'other'];
  const filtered = assetFilter === 'all' ? assetsData : assetsData.filter(a => a.tag === assetFilter);

  const filterHTML = tags.map(t =>
    `<button class="assets-filter-btn ${assetFilter === t ? 'active' : ''}" onclick="assetFilter='${t}';renderAssetsCategory()">
      ${t === 'all' ? 'All' : t.charAt(0).toUpperCase() + t.slice(1)}${t === 'all' ? ' (' + assetsData.length + ')' : ' (' + assetsData.filter(a=>a.tag===t).length + ')'}
    </button>`
  ).join('');

  let gridHTML = '';
  if (filtered.length) {
    gridHTML = `<div class="assets-grid">${filtered.map(asset => `
      <div class="asset-card" onclick="viewAsset('${asset.id}')">
        <img class="asset-card-img" src="${asset.data}" alt="${asset.name}">
        <div class="asset-card-body">
          <div class="asset-card-name">${asset.name}</div>
          <div class="asset-card-meta">
            <span class="asset-card-tag">${asset.tag}</span>
            <span class="asset-card-size">${asset.size}</span>
          </div>
        </div>
      </div>
    `).join('')}</div>`;
  } else {
    gridHTML = `<div class="assets-empty">
      <i class="fas fa-images"></i>
      <p>${assetsData.length ? 'No assets match this filter' : 'No assets uploaded yet'}</p>
      <span>Click "Upload Asset" to add logos, icons, and brand materials</span>
    </div>`;
  }

  main.innerHTML = `
    <div class="category-header">
      <div class="category-header-left">
        <div class="category-icon-lg" style="background:${cat.color}15; color:${cat.color}">
          <i class="fas ${cat.icon}"></i>
        </div>
        <div>
          <h2>${cat.name}</h2>
          <span class="subtitle">${assetsData.length} asset${assetsData.length !== 1 ? 's' : ''} — logos, icons, and brand materials</span>
        </div>
      </div>
      <button class="btn-add-sop" style="border-color:#E879F9;color:#E879F9;" onclick="openUploadModal()">
        <i class="fas fa-cloud-arrow-up"></i> Upload Asset
      </button>
    </div>
    ${filterHTML ? '<div class="assets-filter-row">' + filterHTML + '</div>' : ''}
    ${gridHTML}
  `;
}

// Upload Modal
function openUploadModal() {
  document.getElementById('assetName').value = '';
  document.getElementById('assetTag').value = 'logo';
  clearAssetPreview();
  document.getElementById('uploadModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeUploadModal() {
  document.getElementById('uploadModal').classList.remove('open');
  document.body.style.overflow = '';
  pendingAssetData = null;
}

function handleAssetFile(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 2 * 1024 * 1024) { alert('File must be under 2 MB.'); return; }
  const reader = new FileReader();
  reader.onload = function(e) {
    pendingAssetData = { data: e.target.result, fileName: file.name, fileSize: formatFileSize(file.size), fileType: file.type };
    document.getElementById('assetPreviewImg').src = e.target.result;
    document.getElementById('assetPreviewWrap').style.display = 'inline-block';
    document.getElementById('assetDropzone').style.display = 'none';
    if (!document.getElementById('assetName').value) {
      document.getElementById('assetName').value = file.name.replace(/\.[^/.]+$/, '').replace(/[-_]/g, ' ');
    }
  };
  reader.readAsDataURL(file);
}

function clearAssetPreview() {
  pendingAssetData = null;
  document.getElementById('assetPreviewWrap').style.display = 'none';
  document.getElementById('assetDropzone').style.display = 'flex';
  document.getElementById('assetFileInput').value = '';
}

function saveAsset() {
  const name = document.getElementById('assetName').value.trim();
  const tag = document.getElementById('assetTag').value;
  if (!name) { alert('Please enter an asset name.'); return; }
  if (!pendingAssetData) { alert('Please select a file to upload.'); return; }

  loadAssets();
  assetsData.push({
    id: 'asset_' + Date.now(),
    name, tag,
    data: pendingAssetData.data,
    fileName: pendingAssetData.fileName,
    size: pendingAssetData.fileSize,
    fileType: pendingAssetData.fileType,
    uploadedBy: 'Team',
    uploadedAt: new Date().toISOString().split('T')[0]
  });
  saveAssets();
  closeUploadModal();
  buildSidebar();
  renderAssetsCategory();
}

// Drag & drop
document.addEventListener('DOMContentLoaded', () => {
  const dz = document.getElementById('assetDropzone');
  if (!dz) return;
  ['dragenter','dragover'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.add('drag-over'); }));
  ['dragleave','drop'].forEach(ev => dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.remove('drag-over'); }));
  dz.addEventListener('drop', e => {
    const file = e.dataTransfer.files[0];
    if (file) {
      const input = document.getElementById('assetFileInput');
      const dt = new DataTransfer();
      dt.items.add(file);
      input.files = dt.files;
      handleAssetFile(input);
    }
  });
});

// View Asset
function viewAsset(id) {
  loadAssets();
  const asset = assetsData.find(a => a.id === id);
  if (!asset) return;
  viewingAssetId = id;
  document.getElementById('assetViewTitle').textContent = asset.name;
  document.getElementById('assetViewImg').src = asset.data;
  document.getElementById('assetDownloadBtn').href = asset.data;
  document.getElementById('assetDownloadBtn').download = asset.fileName || (asset.name + '.png');
  document.getElementById('assetViewMeta').innerHTML = `
    <div class="meta-item"><span class="meta-label">Tag</span><span class="meta-value"><span class="asset-card-tag">${asset.tag}</span></span></div>
    <div class="meta-item"><span class="meta-label">File Size</span><span class="meta-value">${asset.size}</span></div>
    <div class="meta-item"><span class="meta-label">Uploaded</span><span class="meta-value">${formatDate(asset.uploadedAt)}</span></div>
    <div class="meta-item"><span class="meta-label">Uploaded By</span><span class="meta-value">${asset.uploadedBy}</span></div>
  `;
  document.getElementById('assetViewModal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeAssetViewModal() {
  document.getElementById('assetViewModal').classList.remove('open');
  document.body.style.overflow = '';
  viewingAssetId = null;
}

async function copyAssetToClipboard() {
  const asset = assetsData.find(a => a.id === viewingAssetId);
  if (!asset) return;
  try {
    const resp = await fetch(asset.data);
    const blob = await resp.blob();
    await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
    const btn = document.getElementById('assetCopyBtn');
    btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
    setTimeout(() => { btn.innerHTML = '<i class="fas fa-copy"></i> Copy Image'; }, 2000);
  } catch (e) {
    alert('Copy not supported in this browser. Use the Download button instead.');
  }
}

function deleteAssetConfirm() {
  if (!confirm('Delete this asset? This cannot be undone.')) return;
  assetsData = assetsData.filter(a => a.id !== viewingAssetId);
  saveAssets();
  closeAssetViewModal();
  buildSidebar();
  renderAssetsCategory();
}

function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeModal(); closeAddModal(); closeUploadModal(); closeAssetViewModal(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

// ── Boot ──
init();
</script>
